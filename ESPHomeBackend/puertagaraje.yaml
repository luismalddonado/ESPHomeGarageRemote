# Globals to store learned signals
globals:
  - id: learned_code
    type: std::vector<int32_t>
    restore_value: false
    initial_value: "{2638, -392, 2616, -369, 2643, -378, 2601, -374, 2644, -382, 2622, -359, 2644, -380, 370, -2624, 2628, -380, 369, -2642, 2605, -382, 369, -2642, 2606, -383, 370, -2642, 377, -2598, 374, -2642, 2609, -384, 371}"
  - id: learning_mode
    type: bool
    initial_value: 'false'
  - id: signal_learned
    type: bool
    initial_value: 'false'
  - id: repeat_counter
    type: int
    restore_value: no
    initial_value: '100'

interval:
  - interval: 3s
    then:
      - if:
          condition:
            lambda: 'return id(repeat_counter) >= 0;'
          then:
            - lambda: |-
                ESP_LOGI("replay", "Pending executions #%d", id(repeat_counter));
                id(repeat_counter)--;
            - lambda: |-
                if (id(learned_code).empty()) {
                  ESP_LOGW("replay", "No signal learned yet!");
                  id(learn_status).publish_state("No signal to replay - learn one first!");
                  return;
                }
                ESP_LOGI("replay", "Sending %d pulses...", id(learned_code).size());
                id(learn_status).publish_state("Transmitting...");
            - remote_transmitter.transmit_raw:
                carrier_frequency: 0Hz
                code: !lambda 'return id(learned_code);'
  - interval: 15s
    then:
      - lambda: |-
          id(repeat_counter_read)->set_value({
            (uint8_t)(id(repeat_counter)),
            (uint8_t)(id(repeat_counter) >> 8),
            (uint8_t)(id(repeat_counter) >> 16),
            (uint8_t)(id(repeat_counter) >> 24)
          });

          id(repeat_counter_read)->notify();
    

esp32_ble:
  io_capability: none
  enable_on_boot: true
  
esp32_ble_server:
  id: puertagaraje
  manufacturer: "ESP32"
  model: "ESP32"
  firmware_version: "1.0.0"
  max_clients: 1  
  on_connect:
    - lambda: |-
        ESP_LOGI("BLE", "Connection started!");
  on_disconnect:
    - lambda: |-
        ESP_LOGI("BLE", "Connection finished!");
  services:
    - uuid: "2a24b789-7aab-4535-af3e-ee76a35cc42d"
      advertise: true
      characteristics:
        - uuid: "cad48e28-7fbe-41cf-bae9-d77a6c233423"
          id: open_the_door
          description: "Button pressed"
          write: true
          notify: true
          on_write:
            then:
                - lambda: |-
                    id(repeat_counter) = 100;
                    ESP_LOGI("BLE", "repeat_counter set to %d", id(repeat_counter));
        - uuid: "cad48e28-7fbe-41cf-bae9-d77a6c233429"
          id: repeat_counter_read
          description: "Seconds since last PING"
          read: true
          notify: true
          value: !lambda |-
                    uint32_t val = id(repeat_counter);
                    return {(uint8_t)(val), (uint8_t)(val >> 8), (uint8_t)(val >> 16), (uint8_t)(val >> 24)};
# SPI Bus
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# CC1101 - Dual Pin Mode
cc1101:
  id: cc1101_module
  cs_pin: GPIO5
  frequency: 433.92MHz
  output_power: 11
  modulation_type: ASK/OOK
  symbol_rate: 5000
  filter_bandwidth: 200kHz

# Remote Transmitter - connected to GDO0
remote_transmitter:
  id: rf_transmitter
  pin: GPIO4
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx: cc1101_module
  on_complete:
    then:
      - cc1101.begin_rx: cc1101_module


button:
  - platform: restart
    name: "Restart"


  - platform: template
    name: "Send Signal"
    icon: "mdi:replay"
    on_press:
      - lambda: |-
          id(repeat_counter)=100;
          ESP_LOGI("BLE", "repeat_counter reset to %d", id(repeat_counter));

text_sensor:
  - platform: template
    name: "Status"
    id: learn_status
    icon: "mdi:information"
 
sensor:
  - platform: template
    name: "Signal length"
    id: signal_length
    icon: "mdi:counter"
    unit_of_measurement: "pulses"
    lambda: 'return id(learned_code).size();'
    update_interval: 5s
    
