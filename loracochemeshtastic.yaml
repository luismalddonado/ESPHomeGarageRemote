substitutions:
  name: loracochemeshtastic
  puertagaraje_ble_mac: "40:22:D8:E9:9A:2A"
  lora_frequency: "868920000"
  spi_clk: GPIO9
  spi_mosi: GPIO10
  spi_miso: GPIO11
  lora_cs: GPIO8
  lora_dio1: GPIO14
  lora_busy: GPIO13
  lora_rst: GPIO12
  i2c_sda: GPIO17
  i2c_scl: GPIO18
  oled_reset: GPIO21
  oled_address: "0x3C"
  vext_pin: GPIO36
  ble_service_uuid: "180F"
  ble_open_door_char_uuid: "1801"
  ble_repeat_counter_char_uuid: "1802"

esphome:
  name: ${name}
  includes:
    - helpers.h
  on_boot:
    priority: 800
    then:
      - switch.turn_on: vext
      
esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

logger:
  level: INFO

#api:
#  reboot_timeout: 0s
#  encryption:
#    key: !secret api_encryption_key

#ota:
