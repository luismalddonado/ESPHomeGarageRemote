esphome:
  name: puertagaraje
  friendly_name: Puerta Garaje
  on_boot:
    priority: -100
    then:
      - lambda: |-
          // =========================
          // SAME STRUCT FOR SAVE/LOAD
          // =========================
          struct LearnedCode {
            uint16_t length;
            int32_t data[256];
          };

          auto prefs = global_preferences->make_preference<LearnedCode>(54321);
          LearnedCode stored;

          if (!prefs.load(&stored)) {
            ESP_LOGW("NVS", "No stored learned_code found");
            return;
          }

          if (stored.length > 256) {
            ESP_LOGE("NVS", "Corrupt data detected: length=%d", stored.length);
            return;
          }

          id(learned_code).clear();

          for (int i = 0; i < stored.length; i++) {
            id(learned_code).push_back(stored.data[i]);
          }

          std::string preview = "";
          int count1 = 0;
          for (int32_t val : id(learned_code)) {
            if (count1 > 0) preview += ", ";
            preview += std::to_string(val);
            count1++;
            if (count1 >= 50) {
              preview += "... (" + std::to_string(id(learned_code).size()) + " total)";
              break;
            }
          }
        
          id(current_signal).publish_state(preview.c_str());
                
          ESP_LOGI("NVS", "Loaded learned_code Size: %d. Signal: [%s]", stored.length, preview.c_str());
esp32:
  board: esp32dev
  framework:
    type: esp-idf 
  
